<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Medieval 3D Maze</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="main.js"></script>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; }
      #hud {
        position: absolute;
        top: 10px;
        left: 10px;
        padding: 5px 10px;
        background: rgba(0,0,0,0.5);
        color: #fff;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div id="hud">Health: <span id="health">100</span></div>
    <a-scene>
      <a-entity id="player" camera wasd-controls look-controls position="0 1.6 0"></a-entity>
      <a-entity id="maze"></a-entity>
      <a-sky color="#302f2f"></a-sky>
      <a-plane rotation="-90 0 0" width="50" height="50" color="#7C6A3C"></a-plane>
    </a-scene>
  </body>
</html>
